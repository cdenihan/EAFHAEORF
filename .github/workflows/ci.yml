name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build:
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
            fail-fast: false
        runs-on: ${{ matrix.os }}
        env:
            ZIG_VERSION: 0.16.0

        steps:
            - uses: actions/checkout@v6

            - uses: mlugg/setup-zig@v2.2.1
              with:
                  version: ${{ env.ZIG_VERSION }}

            - name: Cache Zig build artifacts
              uses: actions/cache@v5
              with:
                  path: |
                      .zig-cache
                      zig-cache
                      zig-pkg
                      ${{ runner.os == 'Windows' && '~\\AppData\\Local\\zig' || '~/.cache/zig' }}
                  key: ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon', 'build/extract_kipr.zig') }}
                  restore-keys: |
                      ${{ runner.os }}-zig-${{ env.ZIG_VERSION }}-

            - name: Fast compile check (template repo)
              if: github.repository == 'Wombat-CC/Wombat-CC'
              run: zig build check -Doptimize=Debug -Dfast_ci=true

            - name: Build (aarch64-linux, ReleaseFast)
              if: github.repository != 'Wombat-CC/Wombat-CC'
              run: zig build -Doptimize=ReleaseFast

            - name: Upload build artifact
              if: github.repository != 'Wombat-CC/Wombat-CC'
              uses: actions/upload-artifact@v7
              with:
                  name: botball_user_program-${{ matrix.os }}
                  path: zig-out/bin/botball_user_program
